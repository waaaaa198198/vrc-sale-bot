name: booth-monitor

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHANNEL_FREE: ${{ secrets.CHANNEL_FREE }}
          CHANNEL_B: ${{ secrets.CHANNEL_B }}
        run: python bot.py

      - name: Commit updated state
        run: |
          if git diff --quiet state.json; then
            echo "No state changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state.json"
            git push
          fi
